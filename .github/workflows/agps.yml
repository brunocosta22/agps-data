name: refresh-agps

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate timestamp
        run: |
          echo "TS=$(date -u +%Y%m%d_%H%M)" >> $GITHUB_ENV

      - name: Download A-GPS
        run: |
          mkdir -p docs/archive
          python3 agps_download.py \
              --no-ini \
              --output docs/archive/agps_${TS}.ubx

      - name: Update latest
        run: |
          cp docs/archive/agps_${TS}.ubx docs/latest.ubx

      - name: Create status page
        run: |
          cat <<EOF > docs/index.html
          <html>
          <body>
          <h1>A-GPS Server</h1>
          <p>Last update: ${TS} UTC</p>
          <a href="latest.ubx">Download latest.ubx</a>
          </body>
          </html>
          EOF

      - name: Commit changes
        run: |
          git config user.name "agps-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          git commit -m "A-GPS refresh ${TS}" || echo "No changes"

          git push
