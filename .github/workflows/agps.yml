  # .github/workflows/agps.yml
  name: refresh-agps
  on:
    schedule: [{ cron: "20 * * * *" }]   # todas as horas (hh:05)
    workflow_dispatch: {}
  permissions: { contents: write }
  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - run: python3 agps_download.py --no-ini --output docs/agps.ubx
        - run: |
            git config user.name  agps-bot
            git config user.email agps-bot@users.noreply.github.com
            git add docs/agps.ubx
            git commit -m "agps refresh $(date -u +%FT%TZ)" || echo "no change"
            git push
